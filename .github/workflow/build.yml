explain in detail name: Build & Publish Microservices to ECR

on:
  push:
    branches:
      - main

env:
  SERVICES: catalog orders ui cart checkout
  SRC_DIR: src
  AWS_REGION: us-east-1
  ECR_URI: 983470701667.dkr.ecr.us-east-1.amazonaws.com/my-app

jobs:

  # ===============================
  # 1. Build images for dev only
  # ===============================
  build-dev:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: ${{ fromJSON('["catalog","orders","ui","cart","checkout"]') }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Build Docker image for dev
        run: |
          SERVICE_PATH=${{ env.SRC_DIR }}/${{ matrix.service }}
          echo "Building image for dev: $SERVICE_PATH"
          docker build -t ${{ matrix.service }}-dev:latest $SERVICE_PATH

      - name: Dev step (optional)
        run: echo "Built dev image for ${{ matrix.service }}"

  # ======================================
  # 2. Manual approval for production
  # ======================================
  manual-approval-prod:
    needs: build-dev
    runs-on: ubuntu-latest
    environment:
      name: production
      reviewers:
        users:
          - Mahmoud123759
    steps:
      - name: Await Production Approval
        run: echo "Approved! Proceeding to build & push prod images"

  # ======================================
  # 3. Build and push images to ECR (prod)
  # ======================================
  build-and-push-prod:
    needs: manual-approval-prod
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: ${{ fromJSON('["catalog","orders","ui","cart","checkout"]') }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set working directory
        run: echo "SERVICE_PATH=${{ env.SRC_DIR }}/${{ matrix.service }}" >> $GITHUB_ENV

      - name: Install AWS CLI
        run: |
          curl "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip" -o "awscliv2.zip"
          unzip awscliv2.zip
          sudo ./aws/install

      - name: Login to Amazon ECR
        run: |
          aws ecr get-login-password \
            --region ${{ env.AWS_REGION }} \
            --access-key-id ${{ secrets.PROD_AWS_ACCESS_KEY_ID }} \
            --secret-access-key ${{ secrets.PROD_AWS_SECRET_ACCESS_KEY }} | \
          docker login --username AWS --password-stdin ${{ env.ECR_URI }}

      - name: Build and tag prod Docker image
        run: |
          IMAGE_URI=${{ env.ECR_URI }}-${{ matrix.service }}:latest
          docker build -t $IMAGE_URI ${{ env.SERVICE_PATH }}

      - name: Push prod image to ECR
        run: |
          IMAGE_URI=${{ env.ECR_URI }}-${{ matrix.service }}:latest
          docker push $IMAGE_URI

      - name: Confirm push
        run: echo "Pushed ${{ matrix.service }} to ECR"