name: Build, Test & Publish Microservices to ECR

on:
  push:
    branches:
      - main

env:
  SRC_DIR: src
  AWS_REGION: us-east-1
  ECR_URI: 983470701667.dkr.ecr.us-east-1.amazonaws.com/my-app

jobs:

  build-dev:
    runs-on: ubuntu-latest
    steps:

      - name: Checkout code
        uses: actions/checkout@v3

      # =========================
      # Setup Java
      # =========================
      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'maven'

      # =========================
      # Setup Node.js
      # =========================
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      # =========================
      # Setup Go
      # =========================
      - name: Setup Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.21'

      # =========================
      # Build Services Sequentially
      # =========================
      - name: Build Services Sequentially
        run: |
          for service in catalog orders ui cart checkout; do
            echo "===================="
            echo "Building $service..."
            echo "===================="

            # Java
            if [ -f "${{ env.SRC_DIR }}/$service/pom.xml" ]; then
              mvn -f ${{ env.SRC_DIR }}/$service/pom.xml clean install
            else
              echo "No pom.xml for $service, skipping Java build."
            fi

            # Node.js
            if [ -f "${{ env.SRC_DIR }}/$service/package.json" ]; then
              cd ${{ env.SRC_DIR }}/$service
              npm install --no-package-lock --legacy-peer-deps
              cd ../../
            else
              echo "No package.json for $service, skipping frontend install."
            fi

            # Go
            if [ -f "${{ env.SRC_DIR }}/$service/main.go" ]; then
              cd ${{ env.SRC_DIR }}/$service
              go build ./...
              cd ../../
            else
              echo "No main.go for $service, skipping Go build."
            fi

      # =========================
      # SonarQube Scan
      # =========================
      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v2
        with:
          projectBaseDir: ${{ env.SRC_DIR }}
          extraArgs: >
            -Dsonar.projectKey=my-microservices
            -Dsonar.sources=${{ env.SRC_DIR }}
            -Dsonar.exclusions=**/node_modules/**,**/target/**
        env:
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      # =========================
      # Trivy FS Scan
      # =========================
      - name: Trivy FS Scan
        uses: aquasecurity/trivy-action@v0.20.0
        with:
          scan-type: fs
          scan-ref: ${{ env.SRC_DIR }}
          format: table
          severity: HIGH,CRITICAL
          exit-code: 1
          output: trivy-fs.txt

      # =========================
      # Build Docker images
      # =========================
      - name: Build Docker images sequentially
        run: |
          for service in catalog orders ui cart checkout; do
            docker build -t $service-dev:latest ${{ env.SRC_DIR }}/$service
          done

      # =========================
      # Trivy Image Scan
      # =========================
      - name: Trivy Image Scan
        run: |
          for service in catalog orders ui cart checkout; do
            trivy image --exit-code 1 --severity HIGH,CRITICAL --format table $service-dev:latest > trivy-image-$service.txt
          done

  manual-approval-prod:
    needs: build-dev
    runs-on: ubuntu-latest
    environment: production
    steps:
      - run: echo "Waiting for approval..."

  build-and-push-prod:
    needs: manual-approval-prod
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        run: |
          aws ecr get-login-password --region $AWS_REGION | docker login --username AWS --password-stdin $ECR_URI

      - name: Build and Push Docker images sequentially
        run: |
          for service in catalog orders ui cart checkout; do
            IMAGE_URI=${ECR_URI}/$service:latest
            docker build -t $IMAGE_URI ${{ env.SRC_DIR }}/$service
            docker push $IMAGE_URI
          done