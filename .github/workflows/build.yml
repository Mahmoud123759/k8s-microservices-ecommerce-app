name: Build, Test & Publish Microservices to ECR

on:
  push:
    branches:
      - main

env:
  SRC_DIR: src
  AWS_REGION: us-east-1
  ECR_URI: 983470701667.dkr.ecr.us-east-1.amazonaws.com/my-app

jobs:

  build-dev:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [catalog, orders, ui, cart, checkout]

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v2
        with:
          projectBaseDir: ${{ env.SRC_DIR }}/${{ matrix.service }}
          args: >
            -Dsonar.projectKey=${{ matrix.service }}
        env:
            SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
            SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      - name: SonarQube Quality Gate
        uses: SonarSource/sonarqube-quality-gate-action@v1
        with:
          scanMetadataReportFile: ${{ env.SRC_DIR }}/${{ matrix.service }}/.scannerwork/report-task.txt
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      # =========================
      # Trivy FS Scan (Code Scan)
      # =========================
      - name: Trivy FS Scan
        uses: aquasecurity/trivy-action@v0.20.0
        with:
          scan-type: fs
          scan-ref: ${{ env.SRC_DIR }}/${{ matrix.service }}
          format: table
          severity: HIGH,CRITICAL
          exit-code: 1
          output: trivy-fs-${{ matrix.service }}.txt

      # =========================
      # Build Docker image
      # =========================
      - name: Build Docker image
        run: |
          docker build -t ${{ matrix.service }}-dev:latest ${{ env.SRC_DIR }}/${{ matrix.service }}

      # =========================
      # Trivy Image Scan
      # =========================
      - name: Trivy Image Scan
        uses: aquasecurity/trivy-action@v0.20.0
        with:
          scan-type: image
          image-ref: ${{ matrix.service }}-dev:latest
          format: table
          severity: HIGH,CRITICAL
          exit-code: 1
          output: trivy-image-${{ matrix.service }}.txt

  manual-approval-prod:
    needs: build-dev
    runs-on: ubuntu-latest
    environment: production
    steps:
      - run: echo "Waiting for approval..."

  build-and-push-prod:
    needs: manual-approval-prod
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [catalog, orders, ui, cart, checkout]

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        run: |
          aws ecr get-login-password --region $AWS_REGION | \
          docker login --username AWS --password-stdin $ECR_URI

      - name: Build and Push
        run: |
          IMAGE_URI=${ECR_URI}/${{ matrix.service }}:latest
          docker build -t $IMAGE_URI ${{ env.SRC_DIR }}/${{ matrix.service }}
          docker push $IMAGE_URI