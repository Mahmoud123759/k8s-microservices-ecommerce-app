name: Build, Test & Publish Microservices to ECR

on:
  push:
    branches:
      - main

env:
  SRC_DIR: src
  AWS_REGION: us-east-1
  ECR_URI: 983470701667.dkr.ecr.us-east-1.amazonaws.com/my-app

jobs:

  build-dev:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [catalog, orders, ui, cart, checkout]

    steps:

      - name: Checkout code
        uses: actions/checkout@v3

      # =========================
      # Setup Java
      # =========================
      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'maven'

      # =========================
      # Setup Node.js
      # =========================
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'
          cache: 'npm'

      # =========================
      # Setup Go
      # =========================
      - name: Setup Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.21'

      # =========================
      # Build Java backend if exists
      # =========================
      - name: Build Java project
        run: |
          if [ -f "${{ env.SRC_DIR }}/${{ matrix.service }}/pom.xml" ]; then
            mvn -f ${{ env.SRC_DIR }}/${{ matrix.service }}/pom.xml clean install
          else
            echo "No pom.xml, skipping Java build."
          fi

      # =========================
      # Install frontend dependencies if package.json exists
      # =========================
      - name: Install Frontend dependencies
        run: |
          if [ -f "${{ env.SRC_DIR }}/${{ matrix.service }}/package.json" ]; then
            cd ${{ env.SRC_DIR }}/${{ matrix.service }}
            npm install --no-package-lock
          else
            echo "No package.json, skipping frontend install."
          fi

      # =========================
      # Build Go backend if main.go exists
      # =========================
      - name: Build Go backend
        run: |
          if [ -f "${{ env.SRC_DIR }}/${{ matrix.service }}/main.go" ]; then
            cd ${{ env.SRC_DIR }}/${{ matrix.service }}
            go build ./...
          else
            echo "No main.go, skipping Go build."
          fi

      # =========================
      # SonarQube Scan
      # =========================
      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v2
        with:
          projectBaseDir: ${{ env.SRC_DIR }}/${{ matrix.service }}
          extraArgs: >
            -Dsonar.projectKey=${{ matrix.service }}
            -Dsonar.java.binaries=${{ env.SRC_DIR }}/${{ matrix.service }}/target/classes
            -Dsonar.go.coverage.reportPaths=${{ env.SRC_DIR }}/${{ matrix.service }}/coverage.out
            -Dsonar.exclusions=**/node_modules/**,**/target/**
        env:
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }} 

      - name: SonarQube Quality Gate
        uses: SonarSource/sonarqube-quality-gate-action@v1
        with:
          scanMetadataReportFile: ${{ env.SRC_DIR }}/${{ matrix.service }}/.scannerwork/report-task.txt
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      # =========================
      # Trivy FS Scan (Code Scan)
      # =========================
      - name: Trivy FS Scan
        uses: aquasecurity/trivy-action@v0.20.0 
        with:
          scan-type: fs
          scan-ref: ${{ env.SRC_DIR }}/${{ matrix.service }}
          format: table
          severity: HIGH,CRITICAL
          exit-code: 1
          output: trivy-fs-${{ matrix.service }}.txt

      # =========================
      # Build Docker image
      # =========================
      - name: Build Docker image
        run: |
          docker build -t ${{ matrix.service }}-dev:latest ${{ env.SRC_DIR }}/${{ matrix.service }}

      # =========================
      # Trivy Image Scan
      # =========================
      - name: Trivy Image Scan
        uses: aquasecurity/trivy-action@v0.20.0
        with:
          scan-type: image
          image-ref: ${{ matrix.service }}-dev:latest
          format: table
          severity: HIGH,CRITICAL
          exit-code: 1
          output: trivy-image-${{ matrix.service }}.txt

  manual-approval-prod:
    needs: build-dev
    runs-on: ubuntu-latest
    environment: production
    steps:
      - run: echo "Waiting for approval..."

  build-and-push-prod:
    needs: manual-approval-prod
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [catalog, orders, ui, cart, checkout]

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        run: |
          aws ecr get-login-password --region $AWS_REGION | \
          docker login --username AWS --password-stdin $ECR_URI

      - name: Build and Push
        run: |
          IMAGE_URI=${ECR_URI}/${{ matrix.service }}:latest
          docker build -t $IMAGE_URI ${{ env.SRC_DIR }}/${{ matrix.service }}
          docker push $IMAGE_URI