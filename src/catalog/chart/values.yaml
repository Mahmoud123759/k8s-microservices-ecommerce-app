# Default values for catalog.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

replicaCount: 1
image:
  repository: 983470701667.dkr.ecr.us-east-1.amazonaws.com/catalog
  pullPolicy: Always
  tag: "14"
imagePullSecrets: []
nameOverride: ""
fullnameOverride: "retail-store-catalog"
opentelemetry:
  enabled: false
serviceAccount:
  # Specifies whether a service account should be created
  create: true
  # Annotations to add to the service account
  annotations: {}
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name: "catalog-sa"
podAnnotations: {}
istio:
  enabled: false
# values.yaml
podDisruptionBudget:
  enabled: false
podSecurityContext:
  fsGroup: 1000
securityContext:
  capabilities:
    drop:
      - ALL
  readOnlyRootFilesystem: true
  runAsNonRoot: true
  runAsUser: 1000
service:
  type: ClusterIP
  port: 80
resources:
  limits:
    memory: 256Mi
  requests:
    cpu: 256m
    memory: 256Mi
autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 10
  targetCPUUtilizationPercentage: 80
  # targetMemoryUtilizationPercentage: 80
nodeSelector: {}
tolerations: []
affinity: {}
topologySpreadConstraints: []
metrics:
  enabled: true
  podAnnotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "8080"
    prometheus.io/path: "/metrics"
configMap:
  create: true
  name: catalog-config
app:
  persistence:
    provider: mysql
    endpoint: "retail-store-catalog-mysql:3306"
    database: "catalog"
    secret:
      create: true
      name: catalog-db
      username: catalog
      password: "catalog123"
mysql:
  create: true
  image:
    repository: public.ecr.aws/docker/library/mysql
    pullPolicy: IfNotPresent
    tag: "8.0"
  service:
    type: ClusterIP
    port: 3306
  podAnnotations: {}
  nodeSelector: {}
  tolerations: []
  affinity: {}
  persistentVolume:
    enabled: false
    annotations: {}
    labels: {}
    accessModes:
      - ReadWriteOnce
    size: 10Gi
    storageClass: ""
securityGroups:
  create: false
  securityGroupIds: []

