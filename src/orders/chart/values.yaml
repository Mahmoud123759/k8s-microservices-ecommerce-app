# Default values for orders.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

replicaCount: 1
image:
  repository: 983470701667.dkr.ecr.us-east-1.amazonaws.com/orders
  pullPolicy: Always
  tag: "14"
imagePullSecrets: []
nameOverride: ""
fullnameOverride: "retail-store-orders"
opentelemetry:
  enabled: false
serviceAccount:
  # Specifies whether a service account should be created
  create: true 
  # Annotations to add to the service account
  annotations: {}
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name: "orders-sa"
podAnnotations: {}
istio:
  enabled: false
podSecurityContext:
  fsGroup: 1000
securityContext:
  capabilities:
    drop:
      - ALL
  readOnlyRootFilesystem: true
  runAsNonRoot: true
  runAsUser: 1000
service:
  type: ClusterIP
  port: 80
resources:
  limits:
    memory: 512Mi
  requests:
    cpu: 256m
    memory: 512Mi
autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 10
  targetCPUUtilizationPercentage: 80
  # targetMemoryUtilizationPercentage: 80
nodeSelector: {}
tolerations: []
affinity: {}
topologySpreadConstraints: []
metrics:
  enabled: true
  podAnnotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "8080"
    prometheus.io/path: "/actuator/prometheus"
configMap:
  create: true
  name: orders-config
app:
  persistence:
    provider: 'postgresql'
    endpoint: 'retail-store-orders-postgresql:5432'
    database: 'orders'
    secret:
      create: true
      name: orders-db
      username: orders
      password: "postgres123"
  messaging:
    provider: 'rabbitmq'
    rabbitmq:
      addresses: [retail-store-orders-rabbitmq:5672]
      secret:
        create: true
        name: orders-rabbitmq
        username: "rabbitmq"
        password: "rabbitmq123"
postgresql:
  create: true
  image:
    repository: public.ecr.aws/docker/library/postgres
    pullPolicy: IfNotPresent
    tag: "13"
  service:
    type: ClusterIP
    port: 5432
  podAnnotations: {}
  nodeSelector: {}
  tolerations: []
  affinity: {}
  persistentVolume:
    enabled: false
    annotations: {}
    labels: {}
    accessModes:
      - ReadWriteOnce
    size: 10Gi
    # storageClass: gp2
rabbitmq:
  create: true
  image:
    repository: public.ecr.aws/docker/library/rabbitmq
    pullPolicy: IfNotPresent
    tag: "3.8-management"
  service:
    type: ClusterIP
    amqp:
      port: 5672
    http:
      port: 15672
  podAnnotations: {}
  nodeSelector: {}
  tolerations: []
  affinity: {}
  persistentVolume:
    enabled: false
    annotations: {}
    labels: {}
    accessModes:
      - ReadWriteOnce
    size: 10Gi
    # storageClass: gp2
securityGroups:
  create: false
  securityGroupIds: []

# values.yaml
podDisruptionBudget:
  enabled: false
