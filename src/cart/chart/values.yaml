# Default values for carts.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

replicaCount: 1
image:
  repository: 983470701667.dkr.ecr.us-east-1.amazonaws.com/cart
  pullPolicy: Always
  tag: "14"
imagePullSecrets: []
nameOverride: ""
fullnameOverride: "retail-store-cart"
opentelemetry:
  enabled: false
serviceAccount:
  # Specifies whether a service account should be created
  create: true
  # Annotations to add to the service account
  annotations: {}
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name: "cart-sa"
podAnnotations: {}
istio:
  enabled: false
podSecurityContext:
  fsGroup: 1000
securityContext:
  capabilities:
    drop:
      - ALL
  readOnlyRootFilesystem: true
  runAsNonRoot: true
  runAsUser: 1000
service:
  type: ClusterIP
  port: 80
resources:
  limits:
    memory: 512Mi
  requests:
    cpu: 256m
    memory: 512Mi
autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 10
  targetCPUUtilizationPercentage: 80
  # targetMemoryUtilizationPercentage: 80
podDisruptionBudget:
  enabled: false
nodeSelector: {}
tolerations: []
affinity: {}
topologySpreadConstraints: []
metrics:
  enabled: true
  podAnnotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "8080"
    prometheus.io/path: "/actuator/prometheus"
configMap:
  create: true
  name: cart-config
app:
  persistence:
    provider: dynamodb
    dynamodb:
      tableName: Items
      createTable: true
      endpoint: "http://retail-store-cart-dynamodb:8000"
dynamodb:
  create: true
  image:
    repository: public.ecr.aws/aws-dynamodb-local/aws-dynamodb-local
    pullPolicy: IfNotPresent
    tag: "1.25.1"
  service:
    type: ClusterIP
    port: 8000
  podAnnotations: {}
  nodeSelector: {}
  tolerations: []
  affinity: {}
podDisruptionBudget:
  enabled: false
