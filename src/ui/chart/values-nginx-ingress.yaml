# Custom values for UI with NGINX Ingress Controller
replicaCount: 1

# Service Account Configuration
serviceAccount:
  # Specifies whether a service account should be created
  create: true
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name: "retail-ui-sa"  # Using a different name to avoid conflicts

service:
  type: ClusterIP
  port: 80

ingress:
  enabled: true
  className: "alb"
  annotations:
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP":80}]'
    alb.ingress.kubernetes.io/healthcheck-path: /
    alb.ingress.kubernetes.io/success-codes: "200"
  hosts:
    - retail-store.iemafzalhassan.in
  tls: []   # ❌ بدون SSL

# Application configuration
app:
  endpoints:
    catalog: http://catalog:80
    carts: http://carts:80
    checkout: http://checkout:80
    orders: http://orders:80

# Resources
resources:
  limits:
    memory: 512Mi
  requests:
    cpu: 128m
    memory: 512Mi

# Metrics
metrics:
  enabled: true
  podAnnotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "8080"
    prometheus.io/path: "/actuator/prometheus"

# Cert Manager Configuration (disabled)
certManager:
  createClusterIssuer: false
